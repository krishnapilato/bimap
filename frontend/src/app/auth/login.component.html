<div class="bg-container">
  <div class="login-card">
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" autocomplete="off" class="login-form">
      
      <div class="form-header">
        <div class="logo-circle">
          <mat-icon style="color: #1976d2;">lock_person</mat-icon>
        </div>
        <h2>Sign in to your account</h2>
        <p>Welcome back! Please enter your details.</p>
      </div>

      <mat-form-field appearance="outline" class="form-field">
        <mat-label>Email Address</mat-label>
        <mat-icon matPrefix style="margin-right: 8px; color: #757575;">email</mat-icon>
        <input
          matInput
          type="email"
          id="username"
          name="username"
          [(ngModel)]="loginRequest.username"
          required
          email
          #email="ngModel"
          placeholder="e.g. name@company.com"
          minlength="3"
          maxlength="100"
        />
        <mat-error *ngIf="email.invalid && email.touched">
          Please enter a valid email address
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="form-field password-field">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix style="margin-right: 8px; color: #757575;">lock</mat-icon>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          id="password"
          name="password"
          [(ngModel)]="loginRequest.password"
          required
          #password="ngModel"
          placeholder="Enter your password"
          minlength="8"
          maxlength="16"
        />
        <button
          *ngIf="loginRequest.password && loginRequest.password.length >= 2"
          mat-icon-button
          matSuffix
          (click)="hidePassword = !hidePassword"
          type="button"
          tabindex="-1"
          matTooltip="Toggle password visibility"
        >
          <mat-icon style="color: #757575;">{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="password.invalid && password.touched">
          Password must be at least 8 characters
        </mat-error>
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="!loginForm.form.valid"
        class="submit-btn"
      >
        Sign In
      </button>
      
    </form>
  </div>
</div>
