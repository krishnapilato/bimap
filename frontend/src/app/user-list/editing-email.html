<div style="width: 100%; padding: 2rem 1.5rem; box-sizing: border-box; text-align: center; font-family: Roboto, 'Helvetica Neue', sans-serif;">
  
  <h2 style="margin: 0 0 0.5rem 0; font-size: 1.5rem; font-weight: 500; color: #2c3e50;">
    Confirm Email
  </h2>
  
  <p style="margin: 0 0 2.5rem 0; font-size: 1rem; color: #555;">
    Are you sure you want to send an email to <br/>
    <strong style="color: #3f51b5;">{{ globalEmail }}</strong>?
  </p>

  <div style="display: flex; justify-content: center; gap: 2rem;">
    <button
      adiButton
      mat-raised-button
      color="primary"
      matTooltip="Accept"
      matTooltipPosition="left"
      (click)="send()"
      style="border-radius: 50px; min-width: 80px; height: 48px; display: flex; justify-content: center; align-items: center;"
    >
      <mat-icon style="margin: 0;">done</mat-icon>
    </button>

    <button
      adiButton
      mat-raised-button
      color="accent"
      matTooltip="Reject"
      matTooltipPosition="right"
      (click)="cancel()"
      style="border-radius: 50px; min-width: 80px; height: 48px; display: flex; justify-content: center; align-items: center;"
    >
      <mat-icon style="margin: 0;">close</mat-icon>
    </button>
  </div>
  
</div>
