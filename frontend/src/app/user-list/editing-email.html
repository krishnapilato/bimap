<div class="dialog-container">
  <div class="dialog-header">
    <div class="icon-halo-wrapper animate__animated animate__zoomIn">
      <div class="icon-circle">
        <mat-icon>mark_email_unread</mat-icon>
      </div>
    </div>
    <h2 class="dialog-title">Send Confirmation</h2>
  </div>

  <div class="dialog-body">
    <p class="dialog-message">
      Are you sure you want to send the confirmation email to this address?
    </p>

    <div class="email-badge-container">
      <div class="email-badge">
        <mat-icon class="badge-icon">alternate_email</mat-icon>
        <span class="email-text">{{ globalEmail }}</span>
      </div>
    </div>
  </div>

  <div class="dialog-actions">
    <button mat-stroked-button class="action-btn cancel-btn" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" class="action-btn send-btn" (click)="send()">
      <mat-icon>send</mat-icon>
      Send Email
    </button>
  </div>
</div>
