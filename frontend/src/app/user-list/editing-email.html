<div class="dialog-container">
  <!-- Header & Icon -->
  <div class="dialog-header">
    <div class="icon-wrapper animate__animated animate__zoomIn">
      <mat-icon color="primary">mail_outline</mat-icon>
    </div>
    <h2 class="dialog-title">Send Email Confirmation</h2>
  </div>

  <!-- Content Body -->
  <div class="dialog-body">
    <p class="dialog-message">Are you sure you want to send an email to</p>
    <div class="email-badge">
      <mat-icon class="badge-icon">alternate_email</mat-icon>
      <span>{{ globalEmail }}</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="dialog-actions">
    <button mat-stroked-button class="action-btn cancel-btn" (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" class="action-btn send-btn" (click)="send()">
      <mat-icon>send</mat-icon>
      Send Email
    </button>
  </div>
</div>
