<div class="map-container" #mapWrapper [style.--split]="leftWidth() + '%'">
  <div
    class="map-panel"
    [style.width.%]="isMobileViewport() ? null : leftWidth()"
    [style.height.%]="isMobileViewport() ? leftWidth() : null"
  >
    <div id="leafletMap" class="map-canvas"></div>

    <button
      type="button"
      class="recenter-btn"
      matTooltip="Recenter on marker"
      matTooltipPosition="above"
      aria-label="Recenter map on marker"
      (click)="recenterView()"
    >
      <mat-icon>my_location</mat-icon>
    </button>

    @if (isDragging()) {
      <div class="drag-overlay"></div>
    }

    <div class="map-info">
      <div class="info-pill">
        <span class="coords">{{ currentCoords() }}</span>
      </div>
    </div>
  </div>

  <div
    class="resizer"
    role="separator"
    [attr.aria-orientation]="isMobileViewport() ? 'horizontal' : 'vertical'"
    aria-label="Resize map and street view panels"
    matTooltip="Drag to resize panels, double-click to reset"
    matTooltipPosition="above"
    (mousedown)="onMouseDown($event)"
    (dblclick)="resetSplit()"
  ></div>

  <div
    class="map-panel"
    [style.width.%]="isMobileViewport() ? null : 100 - leftWidth()"
    [style.height.%]="isMobileViewport() ? 100 - leftWidth() : null"
  >
    <div id="streetView" class="map-canvas"></div>

    @if (isDragging()) {
      <div class="drag-overlay"></div>
    }

  </div>
</div>
