<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Backend Service</title>

    <link rel="icon" href="https://img.icons8.com/nolan/512/backend-development.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        body, html {
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
        }

        /* Map Background */
        #map-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Content Overlay */
        .content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Optional: subtle dark overlay to make the light card pop more */
            background: rgba(0, 0, 0, 0.03);
        }

        /* Hero Card with Light Theme & Halo Effect */
        .hero {
            width: min(900px, 92%);
            padding: 3.5rem 3rem;
            border-radius: 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            color: var(--text-main);

            /* The Halo Effect: Combining a solid white glow with a soft blue/gray diffusion */
            box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.9), /* Inner white halo */ 0 15px 50px rgba(14, 165, 233, 0.15), /* Soft blue ambient glow */ 0 4px 20px rgba(0, 0, 0, 0.05); /* Grounding shadow */

            transition: transform 0.3s ease;
        }

        .hero:hover {
            transform: translateY(-2px);
        }

        /* Title & Typography */
        .hero h1 {
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-muted);
            margin-top: 12px;
            font-size: 1.15rem;
            font-weight: 400;
        }

        /* Buttons */
        .btn-group-custom {
            margin-top: 2.5rem;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-modern {
            padding: 12px 22px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #475569;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .btn-modern:hover {
            transform: translateY(-3px);
            color: #0f172a;
            border-color: #cbd5e1;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.06);
        }

        /* Accent buttons */
        .btn-modern.primary {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border: none;
            color: white;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.25);
        }

        .btn-modern.primary:hover {
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4); /* Mini halo on hover */
            filter: brightness(1.05);
            color: white;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .hero {
                padding: 2rem 1.5rem;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .btn-modern {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body class="user-select-none" oncontextmenu="return false;">

<div id="map-background"></div>

<div class="content-wrapper">
    <div class="hero">
        <h1>Backend Service</h1>

        <p>
            The API is running smoothly, but the endpoint you requested was not found.<br>
            Please choose a destination below to continue.
        </p>

        <div class="btn-group-custom">

            <a href="http://localhost:4200" class="btn-modern primary" target="_blank">
                <i class="bi bi-box-arrow-in-right"></i> Open App
            </a>

            <a href="/swagger-ui/index.html" class="btn-modern">
                <i class="bi bi-journal-code"></i> Swagger API
            </a>

            <a href="https://github.com/krishnapilato/bimap/tree/older" class="btn-modern" target="_blank">
                <i class="bi bi-github"></i> GitHub Repo
            </a>

        </div>

        <div class="footer">
            Spring Boot 4.1 • Java 26 • MySQL 9.7 • REST API Platform
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize the map
    const map = L.map('map-background', {
        zoomControl: false,
        attributionControl: false,
        scrollWheelZoom: true,
        doubleClickZoom: true,
        dragging: true
    }).setView([46.2044, 6.1432], 5); // Start in Geneva

    // Add Google Maps Tile Layer
    L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
        attribution: '© Google',
        maxZoom: 21,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
        noWrap: true,
    }).addTo(map);

    const locations = [
        [41.9028, 12.4964, 11], // Rome
        [45.4642, 9.1900, 11],  // Milan
        [45.4408, 12.3155, 12], // Venice
        [43.7696, 11.2558, 12], // Florence
        [40.8518, 14.2681, 11], // Naples
        [38.1157, 13.3615, 11], // Palermo
        [45.0703, 7.6869, 11],  // Turin
        [44.4949, 11.3426, 12]  // Bologna
    ];

    setInterval(() => {
        const randomLoc = locations[Math.floor(Math.random() * locations.length)];
        const lat = randomLoc[0];
        const lng = randomLoc[1];
        const zoom = randomLoc[2];

        map.flyTo([lat, lng], zoom, {
            animate: true,
            duration: 5.0
        });
    }, 10000);

</script>

</body>
</html>
