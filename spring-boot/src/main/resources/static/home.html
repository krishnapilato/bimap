<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Backend Service</title>

    <link rel="icon" href="https://img.icons8.com/nolan/512/backend-development.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #1e293b, #0b1220);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card */
        .hero {
            width: min(900px, 92%);
            padding: 3rem;
            border-radius: 24px;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(18px);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* Title */
        .hero h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .hero p {
            opacity: 0.85;
            margin-top: 12px;
            font-size: 1.1rem;
        }

        /* Buttons */
        .btn-group-custom {
            margin-top: 2rem;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-modern {
            padding: 12px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            text-decoration: none;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-modern:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.35);
        }

        /* Accent buttons */
        .primary {
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            border: none;
        }

        .primary:hover {
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            opacity: 0.6;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

<div class="hero">
    <h1>Backend Service</h1>

    <p>
        The API is running, but the page you requested was not found.
        Choose a destination below.
    </p>

    <div class="btn-group-custom">

        <!-- Frontend -->
        <a href="http://localhost:4200/login" class="btn-modern primary" target="_blank">
            <i class="bi bi-box-arrow-in-right"></i> Open App
        </a>

        <!-- Swagger -->
        <a href="/swagger-ui/index.html" class="btn-modern">
            <i class="bi bi-journal-code"></i> Swagger API
        </a>

        <!-- GitHub -->
        <a href="https://github.com/krishnapilato/bimap/tree/older" class="btn-modern" target="_blank">
            <i class="bi bi-github"></i> GitHub Repo
        </a>

    </div>

    <div class="footer">
        Spring Boot 4.1 • Java 26 • MySQL 9.7 • REST API Platform
    </div>
</div>

</body>
</html>
